name: Build & Deploy to Azure Container Apps

on:
  workflow_dispatch:


permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name ssnotesdevacr1

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v2
      with:
        appSourcePath: ${{ github.workspace }}
        acrName: ssnotesdevacr1
        containerAppName: ${{ secrets.ACA_NAME }}
        resourceGroup: ${{ secrets.RESOURCE_GROUP }}
        imageToBuild: ${{ secrets.ACR_SERVER }}/${{ secrets.ACR_REPOSITORY }}:${{ github.sha }} 


  